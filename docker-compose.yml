version: '3.8'

services:

  db:
    image: postgres:15
    container_name: finance-db
    environment:
      POSTGRES_USER: nayan
      POSTGRES_PASSWORD: password
      POSTGRES_DB: financedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nayan -d financedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./finance-tracker
      dockerfile: Dockerfile
    container_name: finance-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ML_SERVICE_URL: http://ml-service:8000/forecast
    depends_on:
      db:
        condition: service_healthy

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: finance-ml
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: